# Stack de DESENVOLVIMENTO: Postgres + Spring Boot + Vite dev server com hot reload.
# Uso: docker compose -f docker-compose.dev.yml up --build
# Frontend em http://localhost:5173 (Vite + HMR)
# Backend  em http://localhost:8081
#
# Compartilha o volume "moeda-postgres-data" com o compose de produção:
# alternar entre os dois NÃO apaga dados (use `down -v` se quiser zerar).

services:
  postgres:
    image: postgres:16-alpine
    container_name: moeda-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moeda_estudantil}
      POSTGRES_USER: ${POSTGRES_USER:-moeda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moeda}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # expor pra DBeaver/psql local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moeda} -d ${POSTGRES_DB:-moeda_estudantil}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: moeda-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-moeda_estudantil}
      DB_USER: ${POSTGRES_USER:-moeda}
      DB_PASS: ${POSTGRES_PASSWORD:-moeda}
      # Em dev o frontend roda em :5173 (Vite); inclui também as portas alternativas
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
    ports:
      - "8081:8081"

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: moeda-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Frontend acessa o backend pelo host (porta exposta), não pela network do compose,
      # porque o browser do dev roda no host.
      VITE_API_URL: http://localhost:8081/api
      # Vite com bind mount precisa polling no Windows pra detectar mudanças
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # volume anônimo: protege node_modules do container do bind mount
    ports:
      - "5173:5173"

volumes:
  postgres-data:
    name: moeda-postgres-data
