# Stack de produção/demo: Postgres + Spring Boot + Nginx servindo SPA.
# Uso: docker compose up --build
# Frontend em http://localhost  (porta 80)
# Backend  em http://localhost:8081 (exposto para Cypress/inspeção)

services:
  postgres:
    image: postgres:16-alpine
    container_name: moeda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moeda_estudantil}
      POSTGRES_USER: ${POSTGRES_USER:-moeda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moeda}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moeda} -d ${POSTGRES_DB:-moeda_estudantil}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: moeda-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-moeda_estudantil}
      DB_USER: ${POSTGRES_USER:-moeda}
      DB_PASS: ${POSTGRES_PASSWORD:-moeda}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: moeda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres-data:
    name: moeda-postgres-data
