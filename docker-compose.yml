services:

  postgres:
    image: postgres:16-alpine

    container_name: moeda-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moeda_estudantil}
      POSTGRES_USER: ${POSTGRES_USER:-moeda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moeda}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moeda} -d ${POSTGRES_DB:-moeda_estudantil}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management

    container_name: moeda-rabbitmq

    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend

    container_name: moeda-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: docker

      DB_HOST: postgres
      DB_PORT: 5432

      DB_NAME: ${POSTGRES_DB:-moeda_estudantil}
      DB_USER: ${POSTGRES_USER:-moeda}
      DB_PASS: ${POSTGRES_PASSWORD:-moeda}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}

      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # =====================================
      # RABBITMQ
      # =====================================

      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}

    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend

      args:
        VITE_API_URL: /api

    container_name: moeda-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:
  postgres-data:
    name: moeda-postgres-data