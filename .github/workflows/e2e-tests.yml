name: Tests (JUnit + Cypress E2E)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  junit:
    name: Backend JUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run JUnit tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: backend/target/surefire-reports/

  cypress:
    name: Frontend Cypress E2E
    runs-on: ubuntu-latest
    needs: junit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend (port 8081)
        working-directory: backend
        run: |
          chmod +x mvnw
          nohup ./mvnw spring-boot:run -Dspring-boot.run.arguments=--server.port=8081 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8081/api/vantagem > /dev/null 2>&1; then
              echo "Backend ready after $i seconds"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat backend/backend.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env.local
        working-directory: frontend
        run: echo "VITE_API_URL=http://localhost:8081/api" > .env.local

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install-command: npm ci
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120
          browser: chrome
          # Grava o run no Cypress Cloud (dashboard com vídeos, screenshots, gráficos)
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

      - name: Stop backend
        if: always()
        run: kill $(cat backend/backend.pid) || true
