name: Docker E2E (compose + Cypress)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-e2e:
    name: Stack dockerizada + Cypress
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Build e subir stack (postgres + backend + frontend)
        run: |
          docker compose -f docker-compose.yml up -d --build --wait
        env:
          # CORS precisa aceitar localhost direto (porta 80 do Nginx)
          CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80"

      - name: Aguarda backend pronto (smoke /api/vantagem)
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8081/api/vantagem > /dev/null; then
              echo "Backend ready after $i tentativas"
              exit 0
            fi
            echo "Esperando backend... ($i/30)"
            sleep 3
          done
          echo "Backend não ficou pronto. Logs:"
          docker compose logs backend
          exit 1

      - name: Aguarda frontend pronto (Nginx :80)
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost/ > /dev/null; then
              echo "Frontend ready after $i tentativas"
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Cypress deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Cypress run (baseUrl = Nginx :80)
        working-directory: frontend
        run: npx cypress run --config baseUrl=http://localhost
        env:
          CYPRESS_apiUrl: http://localhost:8081/api

      - name: Coletar logs em caso de falha
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose logs postgres > docker-logs/postgres.log 2>&1 || true
          docker compose logs backend  > docker-logs/backend.log  2>&1 || true
          docker compose logs frontend > docker-logs/frontend.log 2>&1 || true

      - name: Upload Cypress artifacts (falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-and-docker-logs
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
            docker-logs

      - name: Down stack
        if: always()
        run: docker compose down -v
