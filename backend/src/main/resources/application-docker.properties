# Profile docker — ativado via SPRING_PROFILES_ACTIVE=docker (containerizado)
# Sobrescreve application.properties para usar PostgreSQL em vez de H2.

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:moeda_estudantil}
spring.datasource.username=${DB_USER:moeda}
spring.datasource.password=${DB_PASS:moeda}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Desabilita console H2 (não aplicável em prod)
spring.h2.console.enabled=false

# CORS em prod/docker: nginx serve em :80, sem porta 5173 exposta
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80}

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}