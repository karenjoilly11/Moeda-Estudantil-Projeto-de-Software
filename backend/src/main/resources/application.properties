# Servidor
server.port=8081

# Banco de dados H2 (para teste - não precisa instalar PostgreSQL)
spring.datasource.url=jdbc:h2:file:${user.home}/.moeda-estudantil/moeda_estudantil;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.time-zone=America/Sao_Paulo
spring.application.name=moeda-estudantil-api

# Thymeleaf (templates de email)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false

# SMTP (Gmail por padrao). Sobrescrever via env vars em prod.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Habilitar envio real - se false, NotificacaoService apenas loga (modo dev)
app.email.enabled=${MAIL_ENABLED:false}
app.email.from=${MAIL_FROM:noreply@moedaestudantil.local}

# CORS — origens permitidas (CSV). Sobrescrever via env CORS_ALLOWED_ORIGINS em prod/docker.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177}
